version: 2

models:
  - name: stg_engagement_events_report
    columns:
      - name: event_date
        description: "The date when the event took place."
      - name: property
        description: "The specific property associated with the event, such as a website or app."
      - name: fivetran_id
        description: "A unique identifier generated by Fivetran for event tracking."
      - name: event_name
        description: "The name of the event being tracked, such as 'page_view' or 'purchase'."
      - name: total_users
        description: "The total number of users who triggered the event."
      - name: event_count_per_user
        description: "The average number of times each user triggered the event."
      - name: event_count
        description: "The total number of times the event was triggered across all users."
      - name: total_revenue
        description: "The total revenue generated from the tracked event."
      - name: fivetran_synced
        description: "Timestamp indicating when the data was last synced by Fivetran."
